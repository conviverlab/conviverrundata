<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conviver Run 2026 · Painel do Time</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#16101c;
    --bg-elevated:#1d1526;
    --card:#241a30;
    --card-hover:#2b1f3a;
    --border:#372a47;
    --text-primary:#f4eff7;
    --text-secondary:#b6a8c4;
    --text-tertiary:#7c6d8c;
    --coral:#ff6b4a;
    --coral-soft:rgba(255,107,74,.14);
    --purple:#8b5cf6;
    --purple-soft:rgba(139,92,246,.16);
    --success:#3ddc84;
    --success-soft:rgba(61,220,132,.14);
    --warning:#ffb454;
    --warning-soft:rgba(255,180,84,.14);
    --danger:#ff5470;
    --danger-soft:rgba(255,84,112,.14);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(139,92,246,.16), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(255,107,74,.10), transparent 55%),
      var(--bg);
    color:var(--text-primary);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:28px 20px 80px;}
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--coral);font-weight:700;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:clamp(28px,4vw,42px);
    font-weight:700;margin:6px 0 4px;letter-spacing:-.01em;
  }
  .sub{color:var(--text-secondary);font-size:14.5px;max-width:640px;line-height:1.5;}

  header{
    display:flex;flex-wrap:wrap;gap:20px;justify-content:space-between;align-items:flex-end;
    padding-bottom:22px;border-bottom:1px solid var(--border);margin-bottom:26px;
  }
  .countdown{
    background:var(--card);border:1px solid var(--border);border-radius:16px;
    padding:16px 22px;text-align:right;min-width:200px;
  }
  .countdown .num{
    font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:700;line-height:1;
    background:linear-gradient(135deg,var(--coral),var(--purple));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .countdown .lbl{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-tertiary);letter-spacing:.06em;margin-top:2px;}
  .countdown .date{font-size:12px;color:var(--text-secondary);margin-top:6px;}

  nav.tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
  nav.tabs button{
    font-family:'Inter',sans-serif;font-weight:600;font-size:13.5px;
    background:transparent;border:1px solid var(--border);color:var(--text-secondary);
    padding:10px 18px;border-radius:999px;cursor:pointer;transition:.15s ease;
  }
  nav.tabs button:hover{border-color:var(--purple);color:var(--text-primary);}
  nav.tabs button.active{background:var(--purple);border-color:var(--purple);color:#fff;}

  .tabpanel{display:none;}
  .tabpanel.active{display:block;}

  .alert{
    border:1px solid rgba(255,84,112,.4);background:var(--danger-soft);
    border-radius:14px;padding:18px 20px;margin-bottom:22px;
  }
  .alert h3{margin:0 0 8px;font-size:15px;color:var(--danger);font-family:'Space Grotesk',sans-serif;}
  .alert p{margin:10px 0 0;color:var(--text-secondary);font-size:13px;line-height:1.5;}
  .alert.ok{border-color:rgba(61,220,132,.4);background:var(--success-soft);}
  .alert.ok h3{color:var(--success);}

  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px;}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
  .kpi .lbl{font-size:11.5px;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.05em;}
  .kpi input{
    width:100%;background:transparent;border:none;color:var(--text-primary);
    font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;margin-top:4px;padding:0;
  }
  .kpi input:focus{outline:none;color:var(--coral);}
  .kpi .hint{font-size:11px;color:var(--text-tertiary);margin-top:4px;}
  .kpi .static{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;margin-top:4px;}

  .progress-track{height:8px;border-radius:999px;background:var(--bg-elevated);overflow:hidden;margin-top:10px;}
  .progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--coral),var(--purple));transition:width .4s ease;}

  section.block{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:22px;}
  section.block h2{font-family:'Space Grotesk',sans-serif;font-size:17px;margin:0 0 4px;}
  section.block .desc{color:var(--text-tertiary);font-size:12.5px;margin-bottom:16px;}

  table.channels{width:100%;border-collapse:collapse;font-size:13px;}
  table.channels th{
    text-align:left;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace;
    font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;padding:8px 10px;border-bottom:1px solid var(--border);
  }
  table.channels td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text-secondary);}
  table.channels tr:last-child td{border-bottom:none;}
  table.channels input{
    width:70px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;
    color:var(--text-primary);padding:6px 8px;font-family:'JetBrains Mono',monospace;font-size:13px;
  }
  table.channels input:focus{outline:none;border-color:var(--purple);}
  table.channels input.chan-nome{width:100%;min-width:140px;font-family:'Inter',sans-serif;font-size:12.5px;text-align:left;}
  .conv-badge{
    font-family:'JetBrains Mono',monospace;font-size:12px;padding:3px 9px;border-radius:999px;
    background:var(--purple-soft);color:var(--purple);font-weight:600;
  }

  .btn-primary{
    font-family:'Inter',sans-serif;font-weight:600;font-size:13px;
    background:linear-gradient(135deg,var(--coral),var(--purple));
    color:#fff;border:none;padding:10px 18px;border-radius:10px;cursor:pointer;
  }
  .btn-primary:hover{filter:brightness(1.08);}

  .growth-form{display:flex;flex-wrap:wrap;gap:14px;align-items:end;margin-bottom:18px;}
  .growth-form label{display:flex;flex-direction:column;gap:6px;font-size:11.5px;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.04em;}
  .growth-form input{
    background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);
    padding:9px 10px;font-family:'Inter',sans-serif;font-size:13.5px;min-width:150px;
  }
  .growth-form input:focus{outline:none;border-color:var(--purple);}
  .growth-chart svg{width:100%;height:auto;display:block;}
  .growth-chart .axis-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;fill:var(--text-tertiary);}
  .growth-chart .ref-line{stroke:var(--border);stroke-dasharray:4 4;stroke-width:1;}
  .growth-chart .ref-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;fill:var(--text-tertiary);}
  .growth-chart .pt{fill:var(--coral);stroke:var(--bg);stroke-width:1.5;}

  .growth-list{margin-top:14px;max-height:260px;overflow-y:auto;}
  .log-row{
    display:grid;grid-template-columns:70px 70px 70px 70px auto;gap:10px;align-items:center;
    padding:7px 8px;border-bottom:1px solid var(--border);font-size:12.5px;
  }
  .log-row-head{
    font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.05em;
    color:var(--text-tertiary);border-bottom:1px solid var(--border);
  }
  .log-row:last-child{border-bottom:none;}
  .log-date{font-family:'JetBrains Mono',monospace;color:var(--text-secondary);}
  .log-meta{font-family:'JetBrains Mono',monospace;color:var(--text-tertiary);font-size:11px;}
  .log-total{font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--text-primary);}
  .delta{font-family:'JetBrains Mono',monospace;font-size:11.5px;padding:2px 8px;border-radius:999px;}
  .delta.up{background:var(--success-soft);color:var(--success);}
  .delta.down{background:var(--danger-soft);color:var(--danger);}
  .delta.flat{background:var(--bg-elevated);color:var(--text-tertiary);}
  .log-del{
    justify-self:end;background:transparent;border:1px solid var(--border);color:var(--text-tertiary);
    width:24px;height:24px;border-radius:8px;cursor:pointer;font-size:14px;line-height:1;
  }
  .log-del:hover{border-color:var(--danger);color:var(--danger);}

  .pace-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px;}
  @media (max-width:820px){.pace-strip{grid-template-columns:repeat(2,1fr);}}
  .pace-chip{
    background:var(--bg-elevated);border:1px solid var(--border);border-radius:12px;padding:12px 14px;
    display:flex;flex-direction:column;gap:4px;
  }
  .pace-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-tertiary);}
  .pace-val{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:var(--text-primary);}
  .pace-val small{font-family:'Inter',sans-serif;font-size:11px;font-weight:400;color:var(--text-tertiary);margin-left:2px;}
  .pace-status{font-size:10.5px;color:var(--text-tertiary);}

  .chart-legend{display:flex;gap:16px;margin-bottom:8px;font-size:11.5px;color:var(--text-secondary);font-family:'JetBrains Mono',monospace;flex-wrap:wrap;}
  .chart-legend .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle;}
  .chart-legend .diamond{
    display:inline-block;width:8px;height:8px;margin-right:5px;vertical-align:middle;
    background:var(--warning);transform:rotate(45deg);
  }
  .dot-meta{background:var(--text-tertiary);}
  .dot-real{background:linear-gradient(135deg,var(--coral),var(--purple));}
  .growth-chart .today-line{stroke:var(--coral);stroke-width:1.5;stroke-dasharray:3 3;}
  .growth-chart .today-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;fill:var(--coral);}
  .growth-chart .milestone-dot{fill:var(--warning);stroke:var(--bg);stroke-width:1.5;}
  .growth-chart .milestone-dot.start{fill:var(--text-tertiary);}
  .growth-chart .milestone-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;fill:var(--warning);font-weight:700;}

  .amb-table{display:flex;flex-direction:column;gap:8px;}
  .amb-head{
    display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr 1.1fr 32px;gap:10px;
    font-family:'JetBrains Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;
    color:var(--text-tertiary);padding:0 4px;
  }
  .amb-row{
    display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr 1.1fr 32px;gap:10px;align-items:center;
    background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;padding:8px 10px;
  }
  .amb-row input[type=text],.amb-row input[type=date]{
    background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text-primary);
    padding:7px 9px;font-size:12.5px;font-family:'Inter',sans-serif;width:100%;
  }
  .amb-row input:focus{outline:none;border-color:var(--purple);}
  .amb-check{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text-secondary);white-space:nowrap;}
  .amb-check input{accent-color:var(--success);}
  @media (max-width:900px){
    .amb-head{display:none;}
    .amb-row{grid-template-columns:1fr 1fr;grid-auto-rows:auto;}
  }

  /* shared select styling */
  select{
    background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text-primary);
    padding:7px 9px;font-size:12.5px;font-family:'Inter',sans-serif;
  }
  select:focus{outline:none;border-color:var(--purple);}

  /* patrocínios */
  .patro-card{background:var(--bg-elevated);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;}
  .patro-card.fechado{border-color:rgba(61,220,132,.4);}
  .patro-row{display:grid;grid-template-columns:1.4fr 130px 130px 160px 90px 32px;gap:10px;align-items:end;margin-bottom:8px;}
  .patro-row input[type=text]{
    background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text-primary);
    padding:8px 9px;font-size:12.5px;font-family:'Inter',sans-serif;width:100%;
  }
  .patro-row input[type=date]{
    background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text-primary);
    padding:7px 9px;font-size:11.5px;font-family:'Inter',sans-serif;width:100%;
  }
  .patro-row input:focus{outline:none;border-color:var(--purple);}
  .mini-lbl{display:flex;flex-direction:column;gap:4px;font-size:10px;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.03em;}
  .patro-card textarea{
    width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);
    padding:8px 10px;font-size:12.5px;font-family:'Inter',sans-serif;min-height:40px;resize:vertical;
  }
  .patro-card textarea:focus{outline:none;border-color:var(--purple);}
  @media (max-width:900px){ .patro-row{grid-template-columns:1fr 1fr;} }

  /* produção & documentação */
  .prod-card{background:var(--bg-elevated);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:8px;}
  .prod-card.done .prod-title{text-decoration:line-through;color:var(--text-tertiary);}
  .prod-row{display:grid;grid-template-columns:auto 1.6fr 140px 130px 1fr 32px;gap:10px;align-items:center;margin-bottom:6px;}
  .prod-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--success);cursor:pointer;}
  .prod-row input[type=text],.prod-row input[type=date]{
    background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text-primary);
    padding:7px 9px;font-size:12.5px;font-family:'Inter',sans-serif;width:100%;
  }
  .prod-row input:focus{outline:none;border-color:var(--purple);}
  .prod-obs{
    width:100%;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text-secondary);
    padding:7px 9px;font-size:12px;font-family:'Inter',sans-serif;
  }
  .prod-obs:focus{outline:none;border-color:var(--purple);}
  @media (max-width:900px){ .prod-row{grid-template-columns:auto 1fr;} }

  /* orçamento */
  .orc-card{background:var(--bg-elevated);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
  .orc-title{
    font-family:'Space Grotesk',sans-serif;font-size:14.5px;font-weight:700;color:var(--text-primary);
    display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;
  }
  .orc-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px;}
  @media (max-width:820px){ .orc-row{grid-template-columns:1fr;} }
  .orc-fornecedor{
    display:flex;flex-direction:column;gap:6px;background:var(--card);border:1px solid var(--border);
    border-radius:9px;padding:8px;
  }
  .orc-fornecedor.melhor{border-color:rgba(61,220,132,.5);background:var(--success-soft);}
  .orc-fornecedor input[type=text],.orc-fornecedor input[type=number]{
    background:var(--bg-elevated);border:1px solid var(--border);border-radius:7px;color:var(--text-primary);
    padding:7px 9px;font-size:12.5px;font-family:'Inter',sans-serif;width:100%;
  }
  .orc-fornecedor input:focus{outline:none;border-color:var(--purple);}
  .orc-footer{display:flex;gap:14px;align-items:end;flex-wrap:wrap;}
  .orc-footer input[type=text]{
    flex:1;min-width:180px;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text-primary);
    padding:8px 9px;font-size:12.5px;font-family:'Inter',sans-serif;
  }
  .orc-footer input:focus{outline:none;border-color:var(--purple);}

  .timeline{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  @media (max-width:820px){.timeline{grid-template-columns:1fr;}}
  .phase{border:1px solid var(--border);border-radius:14px;padding:18px;position:relative;background:var(--bg-elevated);}
  .phase.current{border-color:var(--coral);box-shadow:0 0 0 1px var(--coral) inset;}
  .phase .tag{
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    padding:3px 9px;border-radius:999px;display:inline-block;margin-bottom:10px;font-weight:700;
  }
  .phase .tag.atual{background:var(--coral-soft);color:var(--coral);}
  .phase .tag.concluida{background:var(--success-soft);color:var(--success);}
  .phase .tag.proxima{background:var(--bg);color:var(--text-tertiary);border:1px solid var(--border);}
  .phase-label-input{
    width:100%;background:transparent;border:none;color:var(--text-primary);
    font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;margin:0 0 8px;padding:2px 0;
  }
  .phase-label-input:focus{outline:none;border-bottom:1px solid var(--purple);}
  .dates-edit{display:flex;align-items:center;gap:6px;margin-bottom:10px;}
  .dates-edit input{
    background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text-secondary);
    padding:5px 6px;font-family:'JetBrains Mono',monospace;font-size:10.5px;flex:1;min-width:0;
  }
  .dates-edit span{color:var(--text-tertiary);font-size:11px;}
  .goal-edit{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
  .goal-edit input{
    width:56px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);
    padding:6px 7px;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;text-align:center;
  }
  .goal-edit span{color:var(--text-tertiary);font-size:12px;}
  .goal-edit-lbl{font-family:'Inter',sans-serif !important;font-size:11px !important;margin-left:2px;}
  .dates-edit input:focus,.goal-edit input:focus{outline:none;border-color:var(--purple);}
  .phase-goals{list-style:none;margin:12px 0 0;padding:0;font-size:12px;color:var(--text-secondary);}
  .phase-goals li{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
  .phase-goals li input[type=text]{
    flex:1;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text-secondary);
    padding:6px 8px;font-size:12px;font-family:'Inter',sans-serif;
  }
  .phase-goals li input:focus{outline:none;border-color:var(--purple);color:var(--text-primary);}
  .phase-goals li button{
    background:transparent;border:1px solid var(--border);color:var(--text-tertiary);
    width:22px;height:22px;border-radius:6px;cursor:pointer;font-size:13px;line-height:1;flex-shrink:0;
  }
  .phase-goals li button:hover{border-color:var(--danger);color:var(--danger);}
  .phase-goals li.goal-add button{border-color:var(--purple);color:var(--purple);}
  .phase-goals li.goal-add button:hover{background:var(--purple);color:#fff;}
  .phase-goals li.goal-add input{font-style:italic;}

  .cl-controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;align-items:center;justify-content:space-between;}
  .filter-group{display:flex;gap:6px;flex-wrap:wrap;}
  .filter-group button{
    font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--bg-elevated);
    border:1px solid var(--border);color:var(--text-secondary);padding:6px 12px;border-radius:8px;cursor:pointer;
  }
  .filter-group button.active{background:var(--purple);border-color:var(--purple);color:#fff;}
  .overall-progress{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-tertiary);}
  .overall-progress b{color:var(--text-primary);}

  .cl-section{margin-bottom:22px;}
  .cl-section-head{
    display:flex;justify-content:space-between;align-items:center;
    padding:8px 2px;border-bottom:1px solid var(--border);margin-bottom:8px;
  }
  .cl-section-head h4{font-family:'Space Grotesk',sans-serif;font-size:14.5px;margin:0;color:var(--text-primary);}
  .cl-section-head .count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-tertiary);}

  .cl-subhead{display:flex;justify-content:space-between;align-items:center;margin:14px 0 4px;padding:4px 8px;}
  .cl-subhead span:first-child{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;
    color:var(--purple);font-weight:700;
  }

function daysBetween(a,b){ return Math.round((b - a) / 86400000); }
function totalPlanDays(){ return daysBetween(START_DATE, EVENT_DATE); }
function parseYMD(str){ return new Date(str + 'T00:00:00'); }

function getMilestones(){
  const sorted = [...state.phases].sort((a,b)=>a.ordem-b.ordem);
  const first = sorted[0];
  const start = first ? parseYMD(first.date_inicio) : START_DATE;
  const startVal = first ? first.meta_inicio : START_INSCRITOS;
  return [
    {date: start, value: startVal},
    ...sorted.map(p => ({date: parseYMD(p.date_fim), value: p.meta_fim}))
  ];
}

function expectedCumulative(dateObj){
  const MILESTONES = getMilestones();
  if(MILESTONES.length < 2) return START_INSCRITOS;
  const days = daysBetween(MILESTONES[0].date, dateObj);
  for(let i=0;i<MILESTONES.length-1;i++){
    const d0 = daysBetween(MILESTONES[0].date, MILESTONES[i].date);
    const d1 = daysBetween(MILESTONES[0].date, MILESTONES[i+1].date);
    if(days <= d1 || i === MILESTONES.length-2){
      const clamped = Math.max(d0, Math.min(days, d1));
      const t = d1===d0 ? 1 : (clamped-d0)/(d1-d0);
      return MILESTONES[i].value + t*(MILESTONES[i+1].value - MILESTONES[i].value);
    }
  }
  return MILESTONES[MILESTONES.length-1].value;
}

function phaseDailyRate(phaseId){
  const p = state.phases.find(x=>x.id===phaseId);
  if(!p) return (FINAL_TARGET-START_INSCRITOS)/totalPlanDays();
  const days = daysBetween(parseYMD(p.date_inicio), parseYMD(p.date_fim));
  return days>0 ? (p.meta_fim - p.meta_inicio) / days : 0;
}

/* ---------------- Realtime ---------------- */

function subscribeRealtime(){
  const refresh = debounce(async ()=>{
    await fetchAll();
    /* Se alguém está com um campo em foco (edição em andamento), não
       substituímos o DOM agora — isso apagaria o que a pessoa está
       digitando. O estado já foi atualizado; o render acontece assim
       que o campo perder o foco (ver listener de focusout em init()). */
    if(isEditingField()){ pendingRemoteRefresh = true; return; }
    render();
  }, 250);
  sb.channel('tracker-changes')
    .on('postgres_changes', {event:'*', schema:'public', table:'phases'}, refresh)
    .on('postgres_changes', {event:'*', schema:'public', table:'checklist_items'}, refresh)
    .on('postgres_changes', {event:'*', schema:'public', table:'daily_log'}, refresh)
    .on('postgres_changes', {event:'*', schema:'public', table:'embaixadores'}, refresh)
    .on('postgres_changes', {event:'*', schema:'public', table:'channels'}, refresh)
    .on('postgres_changes', {event:'*', schema:'public', table:'dashboard_metrics'}, refresh)
    .on('postgres_changes', {event:'*', schema:'public', table:'patrocinios'}, refresh)
    .on('postgres_changes', {event:'*', schema:'public', table:'producao_checklist'}, refresh)
    .on('postgres_changes', {event:'*', schema:'public', table:'orcamento_cotacoes'}, refresh)
    .subscribe((status)=>{
      realtimeStatus = status === 'SUBSCRIBED' ? 'ao vivo' : (status === 'CLOSED' || status === 'CHANNEL_ERROR' ? 'offline' : 'conectando');
      render();
    });
}

  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

        ops.push(sb.from('phases').upsert({
          id:p.id, label:p.label, ordem:p.ordem, date_inicio:p.date_inicio, date_fim:p.date_fim,
          meta_inicio:p.meta_inicio, meta_fim:p.meta_fim, goals:p.goals||[], updated_at:new Date().toISOString()
        }));
      });

      (parsed.checklistItems||[]).forEach(it=>{
        ops.push(sb.from('checklist_items').upsert({
          id:it.id, section:it.section, grp:it.group, title:it.title||'', date_label:it.date||'',
          priority:it.prio||'media', done:!!it.done, responsavel:it.responsavel||'', updated_at:new Date().toISOString()
        }));
      });

      (parsed.dailyLog||[]).forEach(e=>{
        ops.push(sb.from('daily_log').upsert({date:e.date, total:e.total, updated_at:new Date().toISOString()}));
      });

      (parsed.embaixadores||[]).forEach(a=>{
        ops.push(sb.from('embaixadores').upsert({id:a.id, nome:a.nome||'', handle:a.handle||'', cupom:a.cupom||'', reels:!!a.reels, data_pub:a.dataPub||null, updated_at:new Date().toISOString()}));
      });

      (parsed.patrocinios||[]).forEach(p=>{
        ops.push(sb.from('patrocinios').upsert({
          id:p.id, empresa:p.empresa||'', data_primeiro_contato:p.dataPrimeiroContato||null, data_ultimo_contato:p.dataUltimoContato||null,
          status:p.status||'Prospecção', fechado:!!p.fechado, observacoes:p.observacoes||'', updated_at:new Date().toISOString()
        }));
      });

      (parsed.producaoChecklist||[]).forEach(it=>{
        ops.push(sb.from('producao_checklist').upsert({
          id:it.id, titulo:it.titulo||'', categoria:it.categoria||'producao', prazo:it.prazo||null,
          responsavel:it.responsavel||'', done:!!it.done, observacoes:it.observacoes||'', updated_at:new Date().toISOString()
        }));
      });

      Object.entries(parsed.orcamentoCotacoes||{}).forEach(([itemId,c])=>{
        ops.push(sb.from('orcamento_cotacoes').upsert({
          item_id:itemId, fornecedor1:c.fornecedor1||'', valor1:c.valor1, fornecedor2:c.fornecedor2||'', valor2:c.valor2,
          fornecedor3:c.fornecedor3||'', valor3:c.valor3, escolhido:c.escolhido||null, observacoes:c.observacoes||'', updated_at:new Date().toISOString()
        }));
      });

      if(parsed.dashboard){
        (parsed.dashboard.canais||[]).forEach(c=>{
          ops.push(sb.from('channels').upsert({id:c.id, nome:c.nome||'', meta:c.meta||0, resultado:c.resultado||0, updated_at:new Date().toISOString()}));
        });
        ops.push(sb.from('dashboard_metrics').update({patrocinadores:parsed.dashboard.patrocinadores||0, esquentas:parsed.dashboard.esquentas||0, updated_at:new Date().toISOString()}).eq('id',1));
      }

      await Promise.all(ops);
      await fetchAll();
      render();
      alert('Backup importado com sucesso.');
    }catch(e){
      alert('Não consegui importar esse arquivo. Confira se é um .json exportado daqui.');
    }
  };
  reader.readAsText(file);
}

function flashStatus(text, isError){
  const el = document.getElementById('saveMsg');
  if(!el) return;
  el.textContent = text;
  el.classList.remove('show','err');
  void el.offsetWidth;
  el.classList.add('show');
  if(isError) el.classList.add('err');
  clearTimeout(window.__saveTimer);
  window.__saveTimer = setTimeout(()=>el.classList.remove('show'), 1500);
}

function renderPaceAlert(cPhase){
  const now = new Date();
  const daysRemaining = Math.max(0, daysBetween(now, EVENT_DATE));
  const current = getCurrentInscritos();
  const expectedToday = Math.round(expectedCumulative(now));
  const diff = current - expectedToday;
  const adjustedDaily = daysRemaining > 0 ? Math.ceil((FINAL_TARGET - current) / daysRemaining) : 0;
  const phaseRate = phaseDailyRate(cPhase === 'done' ? 'f4' : cPhase);

  if(diff >= 0){
    return `
      <div class="alert ok">
        <h3>Em dia com o plano</h3>
        <p>${current} inscritos realizados ${diff > 0 ? `(${diff} à frente do esperado)` : '(exatamente no esperado)'} para hoje (esperado: ${expectedToday}). Para manter o ritmo até 23/08, o painel calcula ${adjustedDaily}/dia daqui pra frente.</p>
      </div>`;
  }

  return `
    <div class="alert">
      <h3>${Math.abs(diff)} inscritos atrás do plano</h3>
      <p>Esperado até hoje: ${expectedToday} · Realizado: ${current}. Esta fase previa um ritmo de ${phaseRate.toFixed(1)}/dia — para ainda chegar a 450 até 23/08, o ritmo necessário a partir de agora sobe para <strong>${adjustedDaily}/dia</strong>, com ${daysRemaining} dias restantes.</p>
    </div>`;
}

function renderPaceStrip(){
  const now = new Date();
  const cPhaseId = currentPhase();
  const daysRemaining = Math.max(0, daysBetween(now, EVENT_DATE));
  const current = getCurrentInscritos();
  const expectedToday = Math.round(expectedCumulative(now));
  const diff = current - expectedToday;
  const adjustedDaily = daysRemaining > 0 ? (FINAL_TARGET - current) / daysRemaining : 0;
  const statusClass = diff > 0 ? 'up' : diff < 0 ? 'down' : 'flat';
  const statusLabel = diff > 0 ? 'à frente do plano' : diff < 0 ? 'atrás do plano' : 'em cima do plano';
  const phaseRate = phaseDailyRate(cPhaseId === 'done' ? 'f4' : cPhaseId);

  return `
    <div class="pace-strip">
      <div class="pace-chip">
        <span class="pace-lbl">Ritmo exigido nesta fase</span>
        <span class="pace-val">${phaseRate.toFixed(1)}<small>/dia</small></span>
      </div>
      <div class="pace-chip">
        <span class="pace-lbl">Meta ajustada de hoje</span>
        <span class="pace-val">${Math.ceil(adjustedDaily)}<small>/dia</small></span>
      </div>
      <div class="pace-chip">
        <span class="pace-lbl">Esperado até hoje</span>
        <span class="pace-val">${expectedToday}</span>
      </div>
      <div class="pace-chip">
        <span class="pace-lbl">Realizado</span>
        <span class="pace-val">${current}</span>
      </div>
      <div class="pace-chip">
        <span class="pace-lbl">Diferença vs plano</span>
        <span class="pace-val delta ${statusClass}" style="font-size:20px;">${diff>0?'+':''}${diff}</span>
        <span class="pace-status">${statusLabel}</span>
      </div>
    </div>`;
}

function renderGrowthChart(entries){
  const W = 760, H = 260, padL = 44, padR = 20, padT = 16, padB = 30;
  const totalDays = totalPlanDays();
  const MILESTONES = getMilestones();
  const targets = [...state.phases].sort((a,b)=>a.ordem-b.ordem).map(p=>p.meta_fim);
  const maxVal = Math.max(FINAL_TARGET, ...entries.map(e=>e.total)) * 1.06;
  const minVal = 0;
  const xForDay = day => padL + (Math.min(day,totalDays) * (W - padL - padR) / totalDays);
  const yFor = v => H - padB - ((v - minVal) / (maxVal - minVal)) * (H - padT - padB);

  const metaPath = MILESTONES.map((m,i)=>{
    const day = daysBetween(START_DATE, m.date);
    return (i===0?'M':'L') + xForDay(day).toFixed(1) + ',' + yFor(m.value).toFixed(1);
  }).join(' ');

  const milestoneMarkers = MILESTONES.map((m,i)=>{
    const day = daysBetween(START_DATE, m.date);
    const x = xForDay(day), y = yFor(m.value);
    const s = i===0 ? 3.5 : 5.5;
    const dateLbl = `${String(m.date.getDate()).padStart(2,'0')}/${String(m.date.getMonth()+1).padStart(2,'0')}`;
    const labelY = y - s - 6;
    return `
      <polygon points="${x.toFixed(1)},${(y-s).toFixed(1)} ${(x+s).toFixed(1)},${y.toFixed(1)} ${x.toFixed(1)},${(y+s).toFixed(1)} ${(x-s).toFixed(1)},${y.toFixed(1)}" class="milestone-dot ${i===0?'start':''}"><title>${dateLbl}: marco de ${m.value} inscritos</title></polygon>
      <text x="${x.toFixed(1)}" y="${labelY.toFixed(1)}" text-anchor="middle" class="milestone-lbl">${dateLbl}</text>`;
  }).join('');

  const realPoints = entries.map(e => [xForDay(daysBetween(START_DATE, parseYMD(e.date))), yFor(e.total), e]);
  const hasReal = realPoints.length >= 1;
  const realLinePath = realPoints.map((p,i)=> (i===0?'M':'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const realAreaPath = realPoints.length >= 2
    ? realLinePath + ` L${realPoints[realPoints.length-1][0].toFixed(1)},${(H-padB).toFixed(1)} L${realPoints[0][0].toFixed(1)},${(H-padB).toFixed(1)} Z`
    : '';

  const dots = realPoints.map(p=> `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3.5" class="pt"><title>${p[2].date.split('-').reverse().join('/')}: ${p[2].total} inscritos</title></circle>`).join('');

  const now = new Date();
  const todayDay = daysBetween(START_DATE, now);
  const todayX = (todayDay >= 0 && todayDay <= totalDays) ? xForDay(todayDay) : null;

  const xLabels = [];
  for(let day=0; day<=totalDays; day += 5){
    const d = new Date(START_DATE.getTime() + day*86400000);
    xLabels.push(`<text x="${xForDay(day)}" y="${H-8}" text-anchor="middle" class="axis-lbl">${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}</text>`);
  }
  if(totalDays % 5 !== 0){
    const d = EVENT_DATE;
    xLabels.push(`<text x="${xForDay(totalDays)}" y="${H-8}" text-anchor="middle" class="axis-lbl">${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}</text>`);
  }

  const refLines = targets.map(t=>{
    const y = yFor(t);
    return `
      <line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" class="ref-line"/>
      <text x="${W-padR}" y="${y-4}" text-anchor="end" class="ref-lbl">${t}</text>`;
  }).join('');

  const todayMarker = todayX !== null ? `
      <line x1="${todayX.toFixed(1)}" y1="${padT}" x2="${todayX.toFixed(1)}" y2="${H-padB}" class="today-line"/>
      <text x="${todayX.toFixed(1)}" y="${padT-4}" text-anchor="middle" class="today-lbl">hoje</text>` : '';

  return `
    <div class="chart-legend">
      <span><i class="dot dot-meta"></i> Meta (marcos)</span>
      <span><i class="dot dot-real"></i> Realizado</span>
      <span><i class="diamond"></i> Marco de fase</span>
    </div>
    <div class="growth-chart">
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <defs>
          <linearGradient id="growthFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
          </linearGradient>
          <linearGradient id="growthLine" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#ff6b4a"/>
            <stop offset="100%" stop-color="#8b5cf6"/>
          </linearGradient>
        </defs>
        ${refLines}
        ${todayMarker}
        <path d="${metaPath}" fill="none" stroke="var(--text-tertiary)" stroke-width="1.5" stroke-dasharray="5 4"/>
        ${realAreaPath ? `<path d="${realAreaPath}" fill="url(#growthFill)" stroke="none"/>` : ''}
        ${hasReal ? `<path d="${realLinePath}" fill="none" stroke="url(#growthLine)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>` : ''}
        ${dots}
        ${milestoneMarkers}
        ${xLabels.join('')}
      </svg>
    </div>`;
}

function renderGrowthList(entries){
  if(!entries.length) return '';
  const rows = [...entries].reverse().map(e=>{
    const meta = Math.round(expectedCumulative(parseYMD(e.date)));
    const diff = e.total - meta;
    const diffHtml = `<span class="delta ${diff>0?'up':diff<0?'down':'flat'}">${diff>0?'+':''}${diff}</span>`;
    return `
      <div class="log-row">
        <span class="log-date">${e.date.split('-').reverse().join('/')}</span>
        <span class="log-meta">meta ${meta}</span>
        <span class="log-total">${e.total}</span>
        <span class="log-delta">${diffHtml}</span>
        <button class="log-del" data-del-log="${e.date}" title="Remover">×</button>
      </div>`;
  }).join('');
  return `<div class="growth-list">
    <div class="log-row log-row-head">
      <span>Data</span><span>Plano</span><span>Realizado</span><span>vs plano</span><span></span>
    </div>
    ${rows}
  </div>`;
}

function renderOrcamento(){
  const items = state.producaoChecklist.filter(it=>it.categoria==='producao');

  if(!items.length){
    return `<section class="block">
      <h2>Orçamento</h2>
      <div class="desc">Cadastre itens de produção na aba "Produção &amp; Doc." primeiro; eles aparecem aqui automaticamente para comparar até 3 fornecedores.</div>
    </section>`;
  }

  let totalEstimado = 0;
  let itensComCotacao = 0;

  const cards = items.map(it=>{
    const c = state.orcamentoCotacoes[it.id] || {fornecedor1:'',valor1:null,fornecedor2:'',valor2:null,fornecedor3:'',valor3:null,escolhido:null,observacoes:''};
    const valores = [c.valor1, c.valor2, c.valor3].map(v => (v===null||v===undefined||v==='') ? null : Number(v));
    const validos = valores.filter(v => v!==null && !isNaN(v) && v>0);
    if(validos.length) itensComCotacao++;
    const menor = validos.length ? Math.min(...validos) : null;
    const escolhidoVal = c.escolhido ? valores[c.escolhido-1] : null;
    const valorParaTotal = (escolhidoVal!==null && !isNaN(escolhidoVal)) ? escolhidoVal : menor;
    if(valorParaTotal) totalEstimado += valorParaTotal;

    const fornecedorField = (n) => `
      <div class="orc-fornecedor ${menor!==null && valores[n-1]===menor ? 'melhor':''}">
        <input type="text" placeholder="Fornecedor ${n}" data-orc="${it.id}" data-field="fornecedor${n}" value="${c['fornecedor'+n]||''}">
        <input type="number" min="0" step="0.01" placeholder="R$" data-orc="${it.id}" data-field="valor${n}" value="${c['valor'+n]===null||c['valor'+n]===undefined?'':c['valor'+n]}">
      </div>`;

    return `
      <div class="orc-card">
        <div class="orc-title">${it.titulo || '(sem nome)'}${menor!==null?`<span class="conv-badge">menor: R$ ${menor.toLocaleString('pt-BR')}</span>`:''}</div>
        <div class="orc-row">
          ${fornecedorField(1)}
          ${fornecedorField(2)}
          ${fornecedorField(3)}
        </div>
        <div class="orc-footer">
          <label class="mini-lbl">Fornecedor escolhido
            <select data-orc="${it.id}" data-field="escolhido">
              <option value="" ${!c.escolhido?'selected':''}>nenhum</option>
              <option value="1" ${c.escolhido==1?'selected':''}>Fornecedor 1</option>
              <option value="2" ${c.escolhido==2?'selected':''}>Fornecedor 2</option>
              <option value="3" ${c.escolhido==3?'selected':''}>Fornecedor 3</option>
            </select>
          </label>
          <input type="text" placeholder="Observações" data-orc="${it.id}" data-field="observacoes" value="${c.observacoes||''}">
        </div>
      </div>`;
  }).join('');

  return `
    <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px;">
      <div class="kpi"><div class="lbl">Itens no orçamento</div><div class="static">${items.length}</div></div>
      <div class="kpi"><div class="lbl">Com cotação</div><div class="static">${itensComCotacao}</div><div class="hint">de ${items.length}</div></div>
      <div class="kpi"><div class="lbl">Estimativa total</div><div class="static">R$ ${totalEstimado.toLocaleString('pt-BR')}</div><div class="hint">escolhido, senão o menor valor</div></div>
    </div>
    <section class="block">
      <h2>Comparação de fornecedores</h2>
      <div class="desc">Até 3 cotações por item. O menor valor de cada linha fica destacado. Marque o fornecedor escolhido quando decidir.</div>
      ${cards}
    </section>`;
}

function renderPhaseCards(cPhase){
  const now = new Date();
  const sorted = [...state.phases].sort((a,b)=>a.ordem-b.ordem);
  const cards = sorted.map(p=>{
    const start = new Date(p.date_inicio+'T00:00:00');
    const end = new Date(p.date_fim+'T23:59:59');
    let tagClass, tagLabel;
    if(now > end){ tagClass='concluida'; tagLabel='Concluída'; }
    else if(now >= start && now <= end){ tagClass='atual'; tagLabel='Fase atual'; }
    else { tagClass='proxima'; tagLabel='Próxima'; }
    const isCurrent = tagClass === 'atual';
    const goalsHtml = (p.goals||[]).map((g,idx)=>`
      <li>
        <input type="text" value="${g}" data-phase-goal="${p.id}" data-goal-idx="${idx}">
        <button data-phase-goal-del="${p.id}" data-goal-idx="${idx}" title="Remover">×</button>
      </li>`).join('');
    return `
      <div class="phase ${isCurrent?'current':''}">
        <span class="tag ${tagClass}">${tagLabel}</span>
        <input type="text" class="phase-label-input" data-phase="${p.id}" data-field="label" value="${p.label}">
        <div class="dates-edit">
          <input type="date" data-phase="${p.id}" data-field="date_inicio" value="${p.date_inicio}">
          <span>→</span>
          <input type="date" data-phase="${p.id}" data-field="date_fim" value="${p.date_fim}">
        </div>
        <div class="goal-edit">
          <input type="number" min="0" data-phase="${p.id}" data-field="meta_inicio" value="${p.meta_inicio}">
          <span>→</span>
          <input type="number" min="0" data-phase="${p.id}" data-field="meta_fim" value="${p.meta_fim}">
          <span class="goal-edit-lbl">inscritos</span>
        </div>
        <ul class="phase-goals">
          ${goalsHtml}
          <li class="goal-add">
            <input type="text" placeholder="Novo objetivo..." data-phase-goal-new="${p.id}">
            <button data-phase-goal-add="${p.id}" title="Adicionar">+</button>
          </li>
        </ul>
      </div>`;
  }).join('');
  return `<div class="timeline">${cards}</div>`;
}

function renderTimeline(cPhase){
  return renderPhaseCards(cPhase);
}

function renderChecklist(){
  const items = state.checklistItems;
  const total = items.length;
  const done = items.filter(it => it.done).length;
  const sortedPhases = [...state.phases].sort((a,b)=>a.ordem-b.ordem);

  const filtered = items.filter(it=>{
    if(filterPrio !== 'todas' && it.prio !== filterPrio) return false;
    if(filterGroup !== 'todos' && it.group !== filterGroup) return false;
    if(filterStatus === 'pendente' && it.done) return false;
    if(filterStatus === 'concluido' && !it.done) return false;
    return true;
  });

  const phaseOptions = (current) => sortedPhases.map(p=>`<option value="${p.id}" ${p.id===current?'selected':''}>${p.label}</option>`).join('');
  const groupOptions = (current) => GROUPS.map(g=>`<option value="${g.id}" ${g.id===current?'selected':''}>${g.label}</option>`).join('');
  const prioOptions = (current) => ['alta','media','baixa'].map(p=>`<option value="${p}" ${p===current?'selected':''}>${p}</option>`).join('');

  const renderRow = (it) => `
      <div class="item editable ${it.done?'done':''}">
        <input type="checkbox" data-id="${it.id}" ${it.done?'checked':''}>
        <input type="text" class="title-input" placeholder="Título" data-item="${it.id}" data-field="title" value="${it.title}">
        <input type="text" class="date-input" placeholder="data" data-item="${it.id}" data-field="date" value="${it.date}">
        <select data-item="${it.id}" data-field="prio">${prioOptions(it.prio)}</select>
        <select data-item="${it.id}" data-field="section">${phaseOptions(it.section)}</select>
        <select data-item="${it.id}" data-field="group">${groupOptions(it.group)}</select>
        <input type="text" class="resp-input" placeholder="Responsável" data-item="${it.id}" data-field="responsavel" value="${it.responsavel || ''}">
        <button class="log-del" data-item-del="${it.id}" title="Remover">×</button>
      </div>`;

  const sectionsHtml = sortedPhases.map(p=>{
    const secLabel = `${p.label} · ${p.date_inicio.split('-').reverse().join('/')} a ${p.date_fim.split('-').reverse().join('/')}`;
    const secItemsAll = items.filter(it => it.section === p.id);
    const secItemsFiltered = filtered.filter(it => it.section === p.id);
    const secDone = secItemsAll.filter(it=>it.done).length;

    const groupsHtml = GROUPS.map(grp=>{
      const itemsInGroup = secItemsFiltered.filter(it => it.group === grp.id);
      const grpAll = secItemsAll.filter(it => it.group === grp.id);
      const grpDone = grpAll.filter(it=>it.done).length;
      return `
        <div class="cl-subhead">
          <span>${grp.label}</span>
          <span class="count">${grpDone}/${grpAll.length}</span>
        </div>
        ${itemsInGroup.map(renderRow).join('')}
        <button class="btn-ghost add-item-btn" data-add-item="${p.id}" data-add-group="${grp.id}">+ Adicionar item</button>`;
    }).join('');

    return `
      <div class="cl-section">
        <div class="cl-section-head">
          <h4>${secLabel}</h4>
          <span class="count">${secDone}/${secItemsAll.length}</span>
        </div>
        ${groupsHtml}
      </div>`;
  }).join('');

  return `
    <div class="cl-controls">
      <div class="filter-group">
        <button data-group="todos" class="${filterGroup==='todos'?'active':''}">Todos</button>
        <button data-group="divulgacao" class="${filterGroup==='divulgacao'?'active':''}">Divulgação</button>
        <button data-group="operacional" class="${filterGroup==='operacional'?'active':''}">Operacional</button>
      </div>
      <div class="filter-group">
        <button data-prio="todas" class="${filterPrio==='todas'?'active':''}">Todas prioridades</button>
        <button data-prio="alta" class="${filterPrio==='alta'?'active':''}">Alta</button>
        <button data-prio="media" class="${filterPrio==='media'?'active':''}">Média</button>
        <button data-prio="baixa" class="${filterPrio==='baixa'?'active':''}">Baixa</button>
      </div>
      <div class="filter-group">
        <button data-status="todos" class="${filterStatus==='todos'?'active':''}">Todos</button>
        <button data-status="pendente" class="${filterStatus==='pendente'?'active':''}">Pendentes</button>
        <button data-status="concluido" class="${filterStatus==='concluido'?'active':''}">Concluídos</button>
      </div>
      <div class="overall-progress"><b>${done}/${total}</b> ações concluídas</div>
    </div>
    ${sectionsHtml}
  `;
}

function bindEvents(){
  document.querySelectorAll('nav.tabs button').forEach(btn=>{
    btn.onclick = ()=>{ activeTab = btn.dataset.tab; render(); };
  });

  const inscritosInput = document.getElementById('inscritosInput');
  if(inscritosInput){
    inscritosInput.onchange = ()=>{
      const val = Math.max(0, parseInt(inscritosInput.value)||0);
      const today = new Date().toISOString().slice(0,10);
      upsertDailyLog(today, val);
    };
  }
  const esqInput = document.getElementById('esquentasInput');
  if(esqInput) esqInput.onchange = ()=> updateDashboardMetric('esquentas', Math.max(0,parseInt(esqInput.value)||0));

  document.querySelectorAll('input[data-chan]').forEach(el=>{
    el.onchange = ()=>{
      const value = el.dataset.field === 'nome' ? el.value : Math.max(0, parseInt(el.value)||0);
      updateChannelField(el.dataset.chan, el.dataset.field, value);
    };
  });
  document.querySelectorAll('button[data-chan-del]').forEach(btn=>{
    btn.onclick = ()=> deleteChannel(btn.dataset.chanDel);
  });
  const addChanBtn = document.getElementById('addChanBtn');
  if(addChanBtn) addChanBtn.onclick = addChannel;

  document.querySelectorAll('input[type=checkbox][data-id]').forEach(el=>{
    el.onchange = ()=> toggleChecklistItem(el.dataset.id, el.checked);
  });

  document.querySelectorAll('[data-item][data-field]').forEach(el=>{
    el.onchange = ()=> updateChecklistItemField(el.dataset.item, el.dataset.field, el.value);
  });
  document.querySelectorAll('button[data-item-del]').forEach(btn=>{
    btn.onclick = ()=> deleteChecklistItem(btn.dataset.itemDel);
  });
  document.querySelectorAll('button[data-add-item]').forEach(btn=>{
    btn.onclick = ()=> addChecklistItem(btn.dataset.addItem, btn.dataset.addGroup);
  });

  /* Fases: campos e objetivos (goals) */
  document.querySelectorAll('[data-phase][data-field]').forEach(el=>{
    el.onchange = ()=>{
      const field = el.dataset.field;
      const value = (field==='meta_inicio'||field==='meta_fim') ? Math.max(0, parseInt(el.value)||0) : el.value;
      updatePhaseField(el.dataset.phase, field, value);
    };
  });
  document.querySelectorAll('[data-phase-goal]').forEach(el=>{
    el.onchange = ()=>{
      const phaseId = el.dataset.phaseGoal;
      const idx = parseInt(el.dataset.goalIdx);
      const phase = state.phases.find(p=>p.id===phaseId);
      if(!phase) return;
      const goals = [...(phase.goals||[])];
      goals[idx] = el.value;
      updatePhaseGoals(phaseId, goals);
    };
  });
  document.querySelectorAll('[data-phase-goal-del]').forEach(btn=>{
    btn.onclick = ()=>{
      const phaseId = btn.dataset.phaseGoalDel;
      const idx = parseInt(btn.dataset.goalIdx);
      const phase = state.phases.find(p=>p.id===phaseId);
      if(!phase) return;
      const goals = (phase.goals||[]).filter((_,i)=>i!==idx);
      updatePhaseGoals(phaseId, goals);
    };
  });
  document.querySelectorAll('[data-phase-goal-add]').forEach(btn=>{
    btn.onclick = ()=>{
      const phaseId = btn.dataset.phaseGoalAdd;
      const input = document.querySelector(`[data-phase-goal-new="${phaseId}"]`);
      if(!input || !input.value.trim()) return;
      const phase = state.phases.find(p=>p.id===phaseId);
      if(!phase) return;
      const goals = [...(phase.goals||[]), input.value.trim()];
      updatePhaseGoals(phaseId, goals);
    };
  });

  document.querySelectorAll('.filter-group button[data-prio]').forEach(btn=>{
    btn.onclick = ()=>{ filterPrio = btn.dataset.prio; render(); };
  });
  document.querySelectorAll('.filter-group button[data-status]').forEach(btn=>{
    btn.onclick = ()=>{ filterStatus = btn.dataset.status; render(); };
  });
  document.querySelectorAll('.filter-group button[data-group]').forEach(btn=>{
    btn.onclick = ()=>{ filterGroup = btn.dataset.group; render(); };
  });

  const logBtn = document.getElementById('logSaveBtn');
  if(logBtn){
    logBtn.onclick = ()=>{
      const dateVal = document.getElementById('logDateInput').value;
      const totalVal = parseInt(document.getElementById('logTotalInput').value);
      if(!dateVal || isNaN(totalVal) || totalVal < 0) return;
      upsertDailyLog(dateVal, totalVal);
    };
  }
  document.querySelectorAll('button[data-del-log]').forEach(btn=>{
    btn.onclick = ()=> deleteDailyLog(btn.dataset.delLog);
  });

  const addAmbBtn = document.getElementById('addAmbBtn');
  if(addAmbBtn) addAmbBtn.onclick = addEmbaixador;

  document.querySelectorAll('button[data-amb-del]').forEach(btn=>{
    btn.onclick = ()=> deleteEmbaixador(btn.dataset.ambDel);
  });

  document.querySelectorAll('[data-amb][data-field]').forEach(el=>{
    el.onchange = ()=>{
      const value = el.type === 'checkbox' ? el.checked : el.value;
      updateEmbaixadorField(el.dataset.amb, el.dataset.field, value);
    };
  });

  const exportBtn = document.getElementById('exportBtn');
  if(exportBtn) exportBtn.onclick = exportData;

  const importBtn = document.getElementById('importBtn');
  const importFile = document.getElementById('importFile');
  if(importBtn && importFile){
    importBtn.onclick = () => importFile.click();
    importFile.onchange = () => {
      if(importFile.files && importFile.files[0]) importData(importFile.files[0]);
      importFile.value = '';
    };
  }

  /* Patrocínios */
  const addPatroBtn = document.getElementById('addPatroBtn');
  if(addPatroBtn) addPatroBtn.onclick = addPatrocinio;

  document.querySelectorAll('button[data-patro-del]').forEach(btn=>{
    btn.onclick = ()=> deletePatrocinio(btn.dataset.patroDel);
  });

  document.querySelectorAll('[data-patro][data-field]').forEach(el=>{
    el.onchange = ()=>{
      const value = el.type === 'checkbox' ? el.checked : el.value;
      updatePatrocinioField(el.dataset.patro, el.dataset.field, value);
    };
  });

  /* Produção & Documentação */
  const addProdItemBtn = document.getElementById('addProdItemBtn');
  if(addProdItemBtn) addProdItemBtn.onclick = ()=> addProducaoItem('producao');
  const addDocItemBtn = document.getElementById('addDocItemBtn');
  if(addDocItemBtn) addDocItemBtn.onclick = ()=> addProducaoItem('documentacao');

  document.querySelectorAll('button[data-prod-del]').forEach(btn=>{
    btn.onclick = ()=> deleteProducaoItem(btn.dataset.prodDel);
  });

  document.querySelectorAll('[data-prod][data-field]').forEach(el=>{
    el.onchange = ()=>{
      const value = el.type === 'checkbox' ? el.checked : el.value;
      updateProducaoField(el.dataset.prod, el.dataset.field, value);
    };
  });

  document.querySelectorAll('.filter-group button[data-prodcat]').forEach(btn=>{
    btn.onclick = ()=>{ filterProdCat = btn.dataset.prodcat; render(); };
  });
  document.querySelectorAll('.filter-group button[data-prodstatus]').forEach(btn=>{
    btn.onclick = ()=>{ filterProdStatus = btn.dataset.prodstatus; render(); };
  });

  /* Orçamento */
  document.querySelectorAll('[data-orc][data-field]').forEach(el=>{
    el.onchange = ()=>{
      let value = el.value;
      if(el.type === 'number') value = value === '' ? null : Number(value);
      if(el.dataset.field === 'escolhido') value = value === '' ? null : parseInt(value, 10);
      updateOrcamentoField(el.dataset.orc, el.dataset.field, value);
    };
  });
}

/* ---------------- Init ---------------- */

async function init(){
  if(!sb){
    document.getElementById('app').innerHTML = `
      <div class="loading">
        Configure SUPABASE_URL e SUPABASE_ANON_KEY no topo deste arquivo (index.html) antes de usar.<br>
        Veja o README.md para o passo a passo.
      </div>`;
    return;
  }
  try{
    await fetchAll();
  }catch(e){
    document.getElementById('app').innerHTML = `
      <div class="loading">
        Não consegui conectar ao Supabase.<br>
        Confira a URL/chave e se o schema.sql foi executado no seu projeto.<br>
        Detalhe técnico: ${(e && e.message) || e}
      </div>`;
    return;
  }
  render();
  subscribeRealtime();

  /* #app nunca é substituído inteiro (só o innerHTML), então este
     listener sobrevive a todos os re-renders. Quando o campo em edição
     perde o foco, aplicamos qualquer atualização remota que ficou
     pendente enquanto a pessoa digitava. */
  document.getElementById('app').addEventListener('focusout', ()=>{
    if(pendingRemoteRefresh){
      pendingRemoteRefresh = false;
      render();
    }
  }, true);
}

init();
</script>
</body>
</html>
